name: Deploy Supabase Edge Functions

# Why this exists:
# The existing CI job (ci.yml) builds and tests the Vite app but does NOT
# deploy Supabase Edge Functions. Historically that meant the repo and the
# deployed functions drifted — e.g. a fix would land on main but the live
# function would still be running stale code until someone manually ran
# `supabase functions deploy`. This workflow closes that gap: every merge
# to main re-deploys any function whose source changed.
#
# Assumptions:
# - All current functions are `verify_jwt = false` (handled via the CLI
#   flag below). If a future function needs JWT verification, drop its
#   name out of the --no-verify-jwt branch and deploy it plainly.
# - The repo is the single source of truth for function code. Manual
#   uploads via dashboard/MCP are treated as temporary — they will be
#   overwritten on the next deploy of that function.
#
# Secret required:
#   SUPABASE_ACCESS_TOKEN — a personal access token from
#   https://supabase.com/dashboard/account/tokens
#   Add it at: Repo → Settings → Secrets and variables → Actions → New repository secret.

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'

concurrency:
  # Serialise deploys on main so a fast second merge doesn't race the
  # first one. Cancel-in-progress is false because we want each merge's
  # deploy to actually complete — skipping one could leave drift.
  group: supabase-edge-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_PROJECT_REF: nlzhllhkigmsvrzduefz
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          # Need the previous commit so we can diff and see which
          # function dirs actually changed.
          fetch-depth: 2

      - name: Work out which functions changed
        id: changed
        shell: bash
        run: |
          set -euo pipefail

          # Diff against the previous commit on main. On a merge commit,
          # HEAD^ is the previous main tip — exactly what we want.
          changed_paths=$(git diff --name-only HEAD^ HEAD -- 'supabase/functions/' || true)
          echo "Changed paths:"
          echo "$changed_paths"

          # If the _shared dir changed, any function could be affected —
          # redeploy every function rather than guess.
          if echo "$changed_paths" | grep -qE '^supabase/functions/_shared/'; then
            echo "_shared changed — scheduling full redeploy"
            functions=$(ls -1 supabase/functions/ | grep -v '^_' | sort -u)
          else
            # Otherwise, extract the unique function-dir names from the
            # changed paths (column 3 of path "supabase/functions/NAME/...").
            functions=$(echo "$changed_paths" \
              | awk -F/ '$1=="supabase" && $2=="functions" && $3!="" && $3 !~ /^_/ {print $3}' \
              | sort -u)
          fi

          if [ -z "$functions" ]; then
            echo "No function dirs changed — nothing to deploy."
          else
            echo "Will deploy:"
            echo "$functions"
          fi

          # Emit as a newline-delimited multiline output.
          {
            echo "functions<<EOF"
            echo "$functions"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Install Supabase CLI
        if: steps.changed.outputs.functions != ''
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy changed functions
        if: steps.changed.outputs.functions != ''
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set."
            echo "Create one at https://supabase.com/dashboard/account/tokens and"
            echo "add it under Repo Settings → Secrets and variables → Actions."
            exit 1
          fi

          # All current functions expect --no-verify-jwt (in-function auth via
          # x-internal-secret, x-agent-secret, HMAC, or Supabase session). If you
          # add a function that should have gateway JWT verification, deploy it
          # separately above this loop without the --no-verify-jwt flag.
          while IFS= read -r fn; do
            [ -z "$fn" ] && continue
            echo "::group::Deploying $fn"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.functions }}"
